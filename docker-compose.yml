version: "3.8"

services:
  postgres-account:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: accountdb
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: account_password
    ports:
      - "5433:5432"

  postgres-client:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: clientdb
      POSTGRES_USER: client_user
      POSTGRES_PASSWORD: client_password
    ports:
      - "5434:5432"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  account-service:
    build:
      context: ./account
    depends_on:
      - postgres-account
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-account:5432/accountdb
      SPRING_DATASOURCE_USERNAME: account_user
      SPRING_DATASOURCE_PASSWORD: account_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8000:8000"

  client-service:
    build:
      context: ./client
    depends_on:
      - postgres-client
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-client:5432/clientdb
      SPRING_DATASOURCE_USERNAME: client_user
      SPRING_DATASOURCE_PASSWORD: client_password
    ports:
      - "8001:8001"
